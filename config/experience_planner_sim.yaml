tgw_experience_planner_node:
  ros__parameters:
    enable_path_tracking: false
    tracking_odom_topic: "/tgw_experience/fake_odom"
    tracking_cmd_vel_topic: "/tgw_experience/cmd_vel"
    require_tracking_arm: false
    tracking_odom_must_be_in_map_frame: true
    enable_kinematic_replay: true
    kinematic_replay_odom_topic: "/tgw_experience/fake_odom"
    kinematic_replay_reset_on_plan: true
    enable_local_obstacle_cloud: false
    local_obstacle_cloud_topic: "/tgw_experience/local_cloud"
